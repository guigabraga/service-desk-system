<p-toast />
<p-table 
  #dt2 
  [value]="servicesList()" 
  dataKey="id" 
  [rows]="10" 
  [rowsPerPageOptions]="[10, 25, 50]"
  [paginator]="true"
  [globalFilterFields]="['name', 'country.name', 'representative.name', 'status']"
  scrollHeight="flex"
>
  <ng-template #caption>
    <div class="flex">
        <!-- <p-iconfield iconPosition="left" class="ml-auto">
            <p-inputicon>
                <i class="pi pi-search"></i>
            </p-inputicon>
            <input pInputText type="text" (input)="dt2.filterGlobal($event.target.value, 'contains')" placeholder="Search keyword" />
        </p-iconfield> -->
    </div>
  </ng-template>
  <ng-template #header>
    <th style="width:12%">ID</th>
    <th style="width:22%">Criado em:</th>
    <th style="width:22%">Título</th>
    <th style="width:22%">Categoria</th>
    <th style="width:15%">Status</th>
    <th style="width:5%">Detalhes</th>
  </ng-template>
  <ng-template #body let-service>
    <tr>
      <td>
        {{ service.id }}
      </td>
      <td>
        {{ formatDate(service.createDate) }}
      </td>
      <td>
        {{ service.title }}
      </td>
      <td>
        {{ service.category }}
      </td>
      <td>
         <p-select
          [options]="statusOptions"
          [ngModel]="service.status"
          (ngModelChange)="updateStatus({ id: service.id, status: $event })"
          optionLabel="label"
          optionValue="value"
          size="small"
          appendTo="body"
        />
      </td>
      <td>
        <p-button
          icon="pi pi-eye"
          [rounded]="true"
          severity="secondary"
          variant="text"
          (click)="serviceDetails.emit(service)"
        />
      </td>
    </tr>
  </ng-template>
</p-table>
