<p-toolbar>
  <ng-template #start>
    @if (showToggle()) {
      <p-button
        icon="pi pi-bars"
        [rounded]="true"
        severity="secondary"
        variant="text"
        (click)="toggleSidebar()"
      />
    }
    <img 
      [src]="themeService.isDark() ? 'images/logo-small-dark.png' : 'images/logo-small-light.png'" 
      alt="Logo" 
      class="logo" 
    />
  </ng-template>
  <ng-template #end>
    <p-button
      [icon]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'"
      [rounded]="true"
      severity="secondary"
      variant="text"
      (click)="toggleTheme()"
    />
    <p-button
      icon="pi pi-sign-out"
      [rounded]="true"
      [pTooltip]="'Sair'"
      tooltipPosition="bottom"
      severity="danger"
      variant="text"
      (click)="logout()"
    />
  </ng-template>
</p-toolbar>
