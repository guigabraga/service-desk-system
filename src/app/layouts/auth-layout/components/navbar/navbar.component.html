<p-toolbar class="transparent-toolbar">
  <ng-template #start>
  </ng-template>

  <ng-template #end>
    <p-button
      [icon]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'"
      [rounded]="true"
      severity="secondary"
      variant="text"
      (click)="toggleTheme()"
    />
  </ng-template>
</p-toolbar>
